<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>꿈꾸는 내일 - 포근한 시간 계획</title>
  <!-- Google Fonts: Gaegu (Cute Handwriting) & Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
    rel="stylesheet">
  <!-- Tailwind CDN with Cute Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dream-lavender': '#E0C3FC',
            'dream-peach': '#FFD8B1',
            'dream-sky': '#BDE0FE',
            'dream-mint': '#CCFAEB',
            'dream-cream': '#FFF9F0',
            'dream-navy': '#2D3436',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            cute: ['"Gaegu"', 'cursive'],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'cloud-drift': 'cloudDrift 20s linear infinite',
            'fade-in': 'fadeIn 1s ease-out forwards',
            'slide-up-cute': 'slideUpCute 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-15px)' },
            },
            cloudDrift: {
              '0%': { transform: 'translateX(-10%)' },
              '100%': { transform: 'translateX(110%)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUpCute: {
              '0%': { transform: 'translateY(30px) scale(0.9)', opacity: '0' },
              '100%': { transform: 'translateY(0) scale(1)', opacity: '1' },
            },
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
        body {
          @apply bg-dream-lavender text-dream-navy antialiased overflow-x-hidden transition-colors duration-700;
          background: linear-gradient(135deg, #E0C3FC 0%, #BDE0FE 100%);
        }
      }
      @layer utilities {
        .cute-card {
          @apply bg-white/70 backdrop-blur-md border-4 border-white rounded-[2.5rem] shadow-[0_15px_30px_rgba(0,0,0,0.05)];
        }
        .cute-input {
          @apply bg-white/90 border-4 border-transparent focus:border-dream-peach rounded-[2rem] px-8 py-5 text-xl outline-none transition-all placeholder:text-slate-300;
        }
        .cute-button {
          @apply bg-dream-peach hover:bg-dream-peach/80 text-white font-bold rounded-[1.5rem] shadow-lg shadow-dream-peach/30 transition-all hover:scale-105 active:scale-95;
        }
        .pill-tag {
          @apply px-4 py-1.5 rounded-full text-sm font-bold bg-white/50 text-dream-navy/60;
        }
      }
    </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
